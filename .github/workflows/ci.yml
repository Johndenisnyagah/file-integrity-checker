name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Python (required by better-sqlite3)
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Python setuptools
        run: pip install setuptools

      - name: Install dependencies
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1

      - name: Build
        run: npm run build

      - name: Verify build output
        shell: bash
        run: |
          echo "=== Main process ===" && ls out/main/
          echo "=== Preload ===" && ls out/preload/
          echo "=== Renderer ===" && ls out/renderer/
